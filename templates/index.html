<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ótica Expert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f5f5f5; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
    .app { background: white; border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: #534AB7; color: white; padding: 16px 20px; }
    .header h1 { font-size: 18px; font-weight: 500; }
    .header p { font-size: 12px; opacity: 0.8; }
    .tabs { display: flex; border-bottom: 1px solid #eee; overflow-x: auto; }
    .tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; cursor: pointer; color: #888; border: none; background: none; white-space: nowrap; }
    .tab.active { color: #534AB7; border-bottom: 2px solid #534AB7; font-weight: 500; }
    .page { display: none; padding: 20px; }
    .page.active { display: block; }
    .pergunta { font-size: 15px; font-weight: 500; color: #222; margin-bottom: 16px; }
    .opcao { width: 100%; text-align: left; padding: 12px 16px; border: 1px solid #eee; border-radius: 10px; background: white; font-size: 14px; cursor: pointer; margin-bottom: 8px; color: #333; transition: all 0.15s; }
    .opcao:hover, .opcao.selecionado { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; }
    .progresso { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 20px; }
    .progresso-fill { height: 100%; background: #534AB7; border-radius: 2px; transition: width 0.3s; }
    .step { display: none; }
    .step.active { display: block; }
    .loading { color: #888; font-size: 13px; font-style: italic; text-align: center; padding: 20px; }
    .resultado-texto { background: #EEEDFE; border-radius: 12px; padding: 16px; margin-bottom: 16px; font-size: 13px; color: #534AB7; line-height: 1.6; }
    .grid-oculos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .card-oculos { border: 1px solid #eee; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .card-oculos:hover { border-color: #AFA9EC; background: #EEEDFE; }
    .card-oculos img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 8px; }
    .card-oculos p { font-size: 12px; font-weight: 500; color: #333; margin-bottom: 4px; }
    .card-oculos span { font-size: 11px; color: #888; }
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white; font-size: 14px; cursor: pointer; margin-top: 8px; }
    .btn-primary { background: #534AB7; color: white; border: none; margin-bottom: 8px; }
    .chat-msgs { height: 300px; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 8px; }
    .bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .bubble-bot { background: #f0f0f0; color: #222; align-self: flex-start; border-bottom-left-radius: 4px; }
    .bubble-user { background: #534AB7; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .sugestoes { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .sugestao { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; color: #534AB7; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
    .chat-input button { padding: 10px 16px; background: #534AB7; color: white; border: none; border-radius: 10px; cursor: pointer; }
    .galeria-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .galeria-tab { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; color: #534AB7; }
    .galeria-tab.active { background: #534AB7; color: white; border-color: #534AB7; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 20px; width: 90%; max-width: 400px; text-align: center; max-height: 90vh; overflow-y: auto; }
    .modal-content img { width: 100%; max-height: 160px; object-fit: contain; margin-bottom: 12px; }
    .modal-content h3 { font-size: 16px; margin-bottom: 8px; color: #222; }
    .modal-content p { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.5; }
    .oculos-selector { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 12px; }
    .oculos-thumb { flex-shrink: 0; width: 60px; height: 40px; border: 2px solid #eee; border-radius: 8px; padding: 4px; cursor: pointer; object-fit: contain; background: white; }
    .oculos-thumb.ativo { border-color: #534AB7; }
    .status-msg { font-size: 12px; color: #888; text-align: center; padding: 8px; margin-bottom: 8px; }
    .resultado-provador img { width: 100%; border-radius: 12px; margin-bottom: 8px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #eee; border-top-color: #534AB7; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>👓 Ótica Expert</h1>
      <p>Área exclusiva do aluno</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="trocarAba('quiz')">Indicador</button>
      <button class="tab" onclick="trocarAba('galeria')">Catálogo</button>
      <button class="tab" onclick="trocarAba('provador')">Provador IA</button>
      <button class="tab" onclick="trocarAba('chat')">Chat</button>
    </div>

    <!-- QUIZ -->
    <div id="page-quiz" class="page active">
      <div id="step1" class="step active">
        <div class="progresso"><div class="progresso-fill" style="width:33%"></div></div>
        <p class="pergunta">Qual é o formato do seu rosto?</p>
        <button class="opcao" onclick="escolher('rosto','oval',this)">Oval</button>
        <button class="opcao" onclick="escolher('rosto','redondo',this)">Redondo</button>
        <button class="opcao" onclick="escolher('rosto','quadrado',this)">Quadrado</button>
        <button class="opcao" onclick="escolher('rosto','coração',this)">Coração</button>
        <button class="opcao" onclick="escolher('rosto','retangulo',this)">Retângulo</button>
      </div>
      <div id="step2" class="step">
        <div class="progresso"><div class="progresso-fill" style="width:66%"></div></div>
        <p class="pergunta">Qual é o seu estilo?</p>
        <button class="opcao" onclick="escolher('estilo','clássico/executivo',this)">Clássico / Executivo</button>
        <button class="opcao" onclick="escolher('estilo','moderno/fashion',this)">Moderno / Fashion</button>
        <button class="opcao" onclick="escolher('estilo','despojado/casual',this)">Despojado / Casual</button>
        <button class="opcao" onclick="escolher('estilo','esportivo',this)">Esportivo</button>
      </div>
      <div id="step3" class="step">
        <div class="progresso"><div class="progresso-fill" style="width:99%"></div></div>
        <p class="pergunta">Para qual uso principal?</p>
        <button class="opcao" onclick="escolher('uso','Uso diário',this)">Uso diário</button>
        <button class="opcao" onclick="escolher('uso','Trabalho/escritório',this)">Trabalho / Escritório</button>
        <button class="opcao" onclick="escolher('uso','Esporte',this)">Esporte</button>
        <button class="opcao" onclick="escolher('uso','Grau/visão',this)">Grau / Visão</button>
      </div>
      <div id="step-result" class="step">
        <div id="resultado-content"></div>
        <button class="btn" onclick="reiniciar()">🔄 Refazer questionário</button>
      </div>
    </div>

    <!-- CATALOGO -->
    <div id="page-galeria" class="page">
      <div class="galeria-tabs">
        <button class="galeria-tab active" onclick="filtrarGaleria('todos',this)">Todos</button>
        <button class="galeria-tab" onclick="filtrarGaleria('redondo',this)">Redondo</button>
        <button class="galeria-tab" onclick="filtrarGaleria('aviador',this)">Aviador</button>
        <button class="galeria-tab" onclick="filtrarGaleria('gatinho',this)">Gatinho</button>
        <button class="galeria-tab" onclick="filtrarGaleria('quadrado',this)">Quadrado</button>
      </div>
      <div id="grid-galeria" class="grid-oculos"></div>
    </div>

    <!-- PROVADOR IA -->
    <div id="page-provador" class="page">
      <p style="font-size:13px;color:#666;margin-bottom:4px;">Escolha o modelo de óculos:</p>
      <div class="oculos-selector" id="oculos-selector"></div>

      <button class="btn btn-primary" onclick="document.getElementById('input-foto-ia').click()">
        📸 Enviar foto para experimentar
      </button>
      <input type="file" id="input-foto-ia" accept="image/*" style="display:none" onchange="gerarProvadorIA(event)">

      <div id="status-provador" class="status-msg">Selecione um óculos e envie sua foto</div>

      <div id="resultado-provador" style="display:none;">
        <img id="img-resultado" src="" alt="resultado">
        <button class="btn" onclick="limparProvador()">🔄 Tentar outro modelo</button>
      </div>
    </div>

    <!-- CHAT -->
    <div id="page-chat" class="page">
      <div class="chat-msgs" id="chat-msgs">
        <div class="bubble bubble-bot">Olá! Sou especialista em armações de óculos. Pode me perguntar qualquer coisa! 😊</div>
      </div>
      <div style="margin-top:12px;">
        <div class="sugestoes">
          <button class="sugestao" onclick="enviarSugestao('Qual armação combina com rosto oval?')">Rosto oval</button>
          <button class="sugestao" onclick="enviarSugestao('Quais materiais são mais duráveis?')">Materiais</button>
          <button class="sugestao" onclick="enviarSugestao('Tendências de armações 2025')">Tendências</button>
        </div>
        <div class="chat-input">
          <input id="input-msg" type="text" placeholder="Pergunte sobre armações..." onkeydown="if(event.key==='Enter') enviar()">
          <button onclick="enviar()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal" onclick="fecharModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <img id="modal-img" src="" alt="">
      <h3 id="modal-nome"></h3>
      <p id="modal-desc"></p>
      <button class="btn btn-primary" onclick="experimentarDoModal()">👓 Experimentar com IA</button>
      <button class="btn" onclick="fecharModal()">Fechar</button>
    </div>
  </div>

  <script>
    const sessao = Math.random().toString(36).substring(7);
    const respostas = {};
    let stepAtual = 1;
    let catalogoData = [];
    let oculosSelecionado = null;
    let modalOculosAtual = null;

    async function carregarCatalogo() {
      const res = await fetch('/catalogo');
      catalogoData = await res.json();
      renderGaleria(catalogoData);
      renderOculosSelector();
    }

    function renderOculosSelector() {
      const sel = document.getElementById('oculos-selector');
      sel.innerHTML = catalogoData.map(o => `
        <img class="oculos-thumb" src="/static/oculos/${o.imagem}"
             alt="${o.nome}" title="${o.nome}"
             onclick="selecionarOculos('${o.imagem}', this)">
      `).join('');
    }

    function selecionarOculos(imagem, el) {
      document.querySelectorAll('.oculos-thumb').forEach(t => t.classList.remove('ativo'));
      el.classList.add('ativo');
      oculosSelecionado = imagem;
      document.getElementById('status-provador').textContent = `✅ Óculos selecionado! Agora envie sua foto.`;
    }

    async function gerarProvadorIA(event) {
      if (!oculosSelecionado) {
        alert('Selecione um modelo de óculos primeiro!');
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      const modelo = catalogoData.find(o => o.imagem === oculosSelecionado);
      const descricao = modelo ? modelo.nome : oculosSelecionado.replace('.png', '');

      document.getElementById('status-provador').innerHTML = '<span class="spinner"></span> Gerando sua foto com óculos... aguarde alguns segundos.';
      document.getElementById('resultado-provador').style.display = 'none';

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const res = await fetch('/gerar-provador', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              foto: e.target.result,
              modelo: oculosSelecionado,
              descricao: descricao
            })
          });

          const data = await res.json();

          if (data.sucesso) {
            document.getElementById('img-resultado').src = data.imagem;
            document.getElementById('resultado-provador').style.display = 'block';
            document.getElementById('status-provador').textContent = '✅ Pronto! Veja como ficou.';
          } else {
            document.getElementById('status-provador').textContent = '❌ Erro: ' + data.erro;
          }
        } catch (err) {
          document.getElementById('status-provador').textContent = '❌ Erro ao gerar imagem. Tente novamente.';
        }
      };
      reader.readAsDataURL(file);
    }

    function limparProvador() {
      document.getElementById('resultado-provador').style.display = 'none';
      document.getElementById('status-provador').textContent = 'Selecione um óculos e envie sua foto';
      document.getElementById('input-foto-ia').value = '';
    }

    function experimentarDoModal() {
      fecharModal();
      trocarAba('provador');
      if (modalOculosAtual) {
        document.querySelectorAll('.oculos-thumb').forEach(t => {
          if (t.src.includes(modalOculosAtual)) selecionarOculos(modalOculosAtual, t);
        });
      }
    }

    function renderGaleria(lista) {
      document.getElementById('grid-galeria').innerHTML = lista.map(o => `
        <div class="card-oculos" onclick="abrirModal('${o.imagem}','${o.nome}','${o.descricao}')">
          <img src="/static/oculos/${o.imagem}" alt="${o.nome}">
          <p>${o.nome}</p>
          <span>${o.rostos.join(', ')}</span>
        </div>
      `).join('');
    }

    function filtrarGaleria(tipo, btn) {
      document.querySelectorAll('.galeria-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      if (tipo === 'todos') renderGaleria(catalogoData);
      else renderGaleria(catalogoData.filter(o => o.imagem.includes(tipo) || o.nome.toLowerCase().includes(tipo)));
    }

    function abrirModal(imagem, nome, desc) {
      modalOculosAtual = imagem;
      document.getElementById('modal-img').src = `/static/oculos/${imagem}`;
      document.getElementById('modal-nome').textContent = nome;
      document.getElementById('modal-desc').textContent = desc;
      document.getElementById('modal').classList.add('active');
    }

    function fecharModal() {
      document.getElementById('modal').classList.remove('active');
    }

    function trocarAba(aba) {
      ['quiz','galeria','provador','chat'].forEach(a => {
        document.getElementById('page-'+a).classList.toggle('active', a===aba);
      });
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', ['quiz','galeria','provador','chat'][i]===aba);
      });
    }

    function escolher(campo, valor, btn) {
      btn.parentElement.querySelectorAll('.opcao').forEach(b => b.classList.remove('selecionado'));
      btn.classList.add('selecionado');
      respostas[campo] = valor;
      setTimeout(() => {
        stepAtual++;
        if (stepAtual <= 3) {
          document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
          document.getElementById('step'+stepAtual).classList.add('active');
        } else {
          buscarRecomendacao();
        }
      }, 300);
    }

    async function buscarRecomendacao() {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-result').classList.add('active');
      document.getElementById('resultado-content').innerHTML = '<p class="loading">Analisando seu perfil...</p>';
      const res = await fetch('/recomendar', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(respostas)
      });
      const data = await res.json();
      const cards = data.recomendados.map(o => `
        <div class="card-oculos" onclick="abrirModal('${o.imagem}','${o.nome}','${o.descricao}')">
          <img src="/static/oculos/${o.imagem}" alt="${o.nome}">
          <p>${o.nome}</p>
          <span>Toque para experimentar</span>
        </div>
      `).join('');
      document.getElementById('resultado-content').innerHTML = `
        <div class="resultado-texto">${data.resposta.replace(/\n/g,'<br>')}</div>
        <p style="font-size:13px;font-weight:500;color:#333;margin-bottom:12px;">Armações recomendadas:</p>
        <div class="grid-oculos">${cards}</div>
      `;
    }

    function reiniciar() {
      stepAtual = 1;
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step1').classList.add('active');
      document.querySelectorAll('.opcao').forEach(b => b.classList.remove('selecionado'));
      Object.keys(respostas).forEach(k => delete respostas[k]);
    }

    async function enviar() {
      const input = document.getElementById('input-msg');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      adicionarBubble(msg, 'user');
      adicionarBubble('Digitando...', 'bot', 'loading-bubble');
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({mensagem: msg, sessao})
      });
      const data = await res.json();
      document.querySelector('.loading-bubble')?.remove();
      adicionarBubble(data.resposta, 'bot');
    }

    function enviarSugestao(msg) {
      document.getElementById('input-msg').value = msg;
      enviar();
    }

    function adicionarBubble(texto, tipo, classe) {
      const msgs = document.getElementById('chat-msgs');
      const div = document.createElement('div');
      div.className = `bubble bubble-${tipo} ${classe||''}`;
      div.innerHTML = texto.replace(/\n/g,'<br>');
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    carregarCatalogo();
  </script>
</body>
</html>
