<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ótica Expert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f5f5f5; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
    .app { background: white; border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: #534AB7; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 500; }
    .header p { font-size: 12px; opacity: 0.8; }
    .tabs { display: flex; border-bottom: 1px solid #eee; }
    .tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; cursor: pointer; color: #888; border: none; background: none; }
    .tab.active { color: #534AB7; border-bottom: 2px solid #534AB7; font-weight: 500; }
    .page { display: none; padding: 20px; }
    .page.active { display: block; }
    .pergunta { font-size: 15px; font-weight: 500; color: #222; margin-bottom: 16px; }
    .opcao { width: 100%; text-align: left; padding: 12px 16px; border: 1px solid #eee; border-radius: 10px; background: white; font-size: 14px; cursor: pointer; margin-bottom: 8px; color: #333; transition: all 0.15s; }
    .opcao:hover, .opcao.selecionado { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; }
    .progresso { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 20px; }
    .progresso-fill { height: 100%; background: #534AB7; border-radius: 2px; transition: width 0.3s; }
    .resultado { background: #EEEDFE; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .resultado h3 { color: #3C3489; font-size: 15px; margin-bottom: 8px; }
    .resultado p { color: #534AB7; font-size: 13px; line-height: 1.6; }
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white; font-size: 14px; cursor: pointer; margin-top: 8px; }
    .chat-msgs { height: 380px; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 8px; }
    .bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .bubble-bot { background: #f0f0f0; color: #222; align-self: flex-start; border-bottom-left-radius: 4px; }
    .bubble-user { background: #534AB7; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .sugestoes { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .sugestao { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; color: #534AB7; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
    .chat-input button { padding: 10px 16px; background: #534AB7; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; }
    .step { display: none; }
    .step.active { display: block; }
    .loading { color: #888; font-size: 13px; font-style: italic; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>👓 Ótica Expert</h1>
        <p>Área exclusiva do aluno</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="trocarAba('quiz')">Indicador</button>
      <button class="tab" onclick="trocarAba('chat')">Chat</button>
    </div>

    <div id="page-quiz" class="page active">
      <div id="step1" class="step active">
        <div class="progresso"><div class="progresso-fill" style="width:33%"></div></div>
        <p class="pergunta">Qual é o formato do seu rosto?</p>
        <button class="opcao" onclick="escolher('rosto', 'Oval', this)">Oval</button>
        <button class="opcao" onclick="escolher('rosto', 'Redondo', this)">Redondo</button>
        <button class="opcao" onclick="escolher('rosto', 'Quadrado', this)">Quadrado</button>
        <button class="opcao" onclick="escolher('rosto', 'Coração', this)">Coração</button>
      </div>

      <div id="step2" class="step">
        <div class="progresso"><div class="progresso-fill" style="width:66%"></div></div>
        <p class="pergunta">Qual é o seu estilo?</p>
        <button class="opcao" onclick="escolher('estilo', 'Clássico/executivo', this)">Clássico / Executivo</button>
        <button class="opcao" onclick="escolher('estilo', 'Moderno/fashion', this)">Moderno / Fashion</button>
        <button class="opcao" onclick="escolher('estilo', 'Despojado/casual', this)">Despojado / Casual</button>
        <button class="opcao" onclick="escolher('estilo', 'Esportivo', this)">Esportivo</button>
      </div>

      <div id="step3" class="step">
        <div class="progresso"><div class="progresso-fill" style="width:99%"></div></div>
        <p class="pergunta">Para qual uso principal?</p>
        <button class="opcao" onclick="escolher('uso', 'Uso diário', this)">Uso diário</button>
        <button class="opcao" onclick="escolher('uso', 'Trabalho/escritório', this)">Trabalho / Escritório</button>
        <button class="opcao" onclick="escolher('uso', 'Esporte', this)">Esporte</button>
        <button class="opcao" onclick="escolher('uso', 'Grau/visão', this)">Grau / Visão</button>
      </div>

      <div id="step-result" class="step">
        <div id="resultado-content"></div>
        <button class="btn" onclick="reiniciar()">🔄 Refazer questionário</button>
      </div>
    </div>

    <div id="page-chat" class="page">
      <div class="chat-msgs" id="chat-msgs">
        <div class="bubble bubble-bot">Olá! Sou especialista em armações de óculos. Pode me perguntar qualquer coisa! 😊</div>
      </div>
      <div style="margin-top: 12px;">
        <div class="sugestoes">
          <button class="sugestao" onclick="enviarSugestao('Qual armação combina com rosto oval?')">Rosto oval</button>
          <button class="sugestao" onclick="enviarSugestao('Quais materiais são mais duráveis?')">Materiais</button>
          <button class="sugestao" onclick="enviarSugestao('Tendências de armações 2025')">Tendências</button>
        </div>
        <div class="chat-input">
          <input id="input-msg" type="text" placeholder="Pergunte sobre armações..." onkeydown="if(event.key==='Enter') enviar()">
          <button onclick="enviar()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const respostas = {};
    const sessao = Math.random().toString(36).substring(7);
    let stepAtual = 1;

    function trocarAba(aba) {
      document.getElementById('page-quiz').classList.toggle('active', aba === 'quiz');
      document.getElementById('page-chat').classList.toggle('active', aba === 'chat');
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (aba === 'quiz' && i === 0) || (aba === 'chat' && i === 1));
      });
    }

    function escolher(campo, valor, btn) {
      btn.parentElement.querySelectorAll('.opcao').forEach(b => b.classList.remove('selecionado'));
      btn.classList.add('selecionado');
      respostas[campo] = valor;
      setTimeout(() => {
        stepAtual++;
        if (stepAtual <= 3) {
          document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
          document.getElementById('step' + stepAtual).classList.add('active');
        } else {
          buscarRecomendacao();
        }
      }, 300);
    }

    async function buscarRecomendacao() {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-result').classList.add('active');
      document.getElementById('resultado-content').innerHTML = '<p class="loading">Analisando seu perfil...</p>';

      const res = await fetch('/recomendar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(respostas)
      });
      const data = await res.json();

      document.getElementById('resultado-content').innerHTML = `
        <div class="resultado">
          <h3>✨ Sua armação ideal</h3>
          <p>${data.resposta.replace(/\n/g, '<br>')}</p>
        </div>
      `;
    }

    function reiniciar() {
      stepAtual = 1;
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step1').classList.add('active');
      document.querySelectorAll('.opcao').forEach(b => b.classList.remove('selecionado'));
    }

    async function enviar() {
      const input = document.getElementById('input-msg');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      adicionarBubble(msg, 'user');
      adicionarBubble('Digitando...', 'bot', 'loading-bubble');

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem: msg, sessao })
      });
      const data = await res.json();

      document.querySelector('.loading-bubble')?.remove();
      adicionarBubble(data.resposta, 'bot');
    }

    function enviarSugestao(msg) {
      document.getElementById('input-msg').value = msg;
      enviar();
    }

    function adicionarBubble(texto, tipo, classe) {
      const msgs = document.getElementById('chat-msgs');
      const div = document.createElement('div');
      div.className = `bubble bubble-${tipo} ${classe || ''}`;
      div.innerHTML = texto.replace(/\n/g, '<br>');
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>
